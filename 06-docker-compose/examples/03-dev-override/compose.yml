# compose.yml — 기본 설정 (프로덕션 기준)
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: mydb
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
