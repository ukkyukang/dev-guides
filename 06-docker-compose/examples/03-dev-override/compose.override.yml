# compose.override.yml — 개발 전용 설정
# `docker compose up` 시 자동으로 compose.yml과 병합됩니다
services:
  api:
    volumes:
      - ./src:/app/src               # 소스코드 바인드 마운트 (핫 리로드)
    environment:
      - DEBUG=true
    command: ["uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]

  db:
    ports:
      - "5432:5432"                   # 개발시에만 DB 포트 노출 (DBeaver 등 접속용)
    environment:
      POSTGRES_PASSWORD: devpassword  # 개발용 비밀번호
