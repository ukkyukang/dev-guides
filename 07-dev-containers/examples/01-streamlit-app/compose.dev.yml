# compose.dev.yml — 개발용 Docker Compose
#
# 핵심: 소스코드(./src)를 컨테이너에 마운트하여
# 코드 수정이 즉시 반영되도록 합니다.
#
# 실행: docker compose -f compose.dev.yml up --build

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src    # ← 핵심! 호스트의 소스코드를 마운트
    command: >
      uv run streamlit run src/my_app/app.py
      --server.address 0.0.0.0
      --server.runOnSave true
