[project]
name = "api"
version = "0.1.0"
description = "API 서버 — core 패키지를 사용하는 예제"
requires-python = ">=3.12"
dependencies = [
    "core",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]

# core 패키지를 워크스페이스에서 가져옴 (핵심!)
[tool.uv.sources]
core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
